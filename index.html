<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meme Matching Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <h1>MEME MATCHING GAME</h1>
        <p class="instructions">
            Welcome to the Meme Matching Game! Flip over two cards at a time and try to find all the matching pairs. Be
            quick and remember where you saw the cards!
        </p>
        <button id="start-game">Start Game</button>
        <div id="game-board" class="game-board">
            <!-- Cards will be generated here -->
        </div>
    </div>

    <!-- Congratulations Modal -->
    <div id="congratulations-modal" class="congratulations-modal hidden">
        <div class="congratulations-content">
            <h2>🎉 Congratulations! 🎉</h2>
            <p>You found them all!</p>
            <button id="play-again-btn" class="play-again-btn">Play Again</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
